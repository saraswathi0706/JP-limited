databases:
  - name: bridgesmart-db
    databaseName: bridgesmart
    userName: postgres
    plan: free

services:
  # Redis Managed Service
  - type: redis
    name: bridgesmart-redis
    plan: free
    ipAllowList: []

  # FastAPI Backend
  - type: web
    name: bridgesmart-backend
    runtime: docker
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bridgesmart-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: bridgesmart-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: true

  # Celery Async Worker
  - type: worker
    name: bridgesmart-celery-worker
    runtime: docker
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    dockerCommand: celery -A app.tasks.celery_app worker --loglevel=info
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bridgesmart-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: bridgesmart-redis
          property: connectionString
      - key: SECRET_KEY
        fromService:
          name: bridgesmart-backend
          type: web
          envVarKey: SECRET_KEY
      - key: ENCRYPTION_KEY
        fromService:
          name: bridgesmart-backend
          type: web
          envVarKey: ENCRYPTION_KEY
      - key: OPENAI_API_KEY
        sync: true

  # React Frontend (Static Site)
  - type: web
    name: bridgesmart-frontend
    runtime: static
    buildCommand: npm run build
    staticPublishPath: dist
    rootDirectory: frontend
    plan: free
    envVars:
      - key: VITE_API_URL
        fromService:
          name: bridgesmart-backend
          type: web
          property: url
