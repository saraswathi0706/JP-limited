databases:
  - name: bridgesmart-db
    databaseName: bridgesmart
    user: postgres
    plan: free

services:
  # Redis Managed Service
  - type: redis
    name: bridgesmart-redis
    plan: free
    ipAllowList: []

  # FastAPI Backend
  - type: web
    name: bridgesmart-backend
    env: docker
    dockerContext: backend
    dockerFilePath: backend/Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bridgesmart-db
          property: connectionString
      - key: REDIS_URL
        value: redis://bridgesmart-redis:6379/0
      - key: SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: true

  # Celery Async Worker
  - type: worker
    name: bridgesmart-celery-worker
    env: docker
    dockerContext: backend
    dockerFilePath: backend/Dockerfile
    dockerCommand: celery -A app.tasks.celery_app worker --loglevel=info
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bridgesmart-db
          property: connectionString
      - key: REDIS_URL
        value: redis://bridgesmart-redis:6379/0
      - key: SECRET_KEY
        fromService:
          name: bridgesmart-backend
          type: web
          envVar: SECRET_KEY
      - key: ENCRYPTION_KEY
        fromService:
          name: bridgesmart-backend
          type: web
          envVar: ENCRYPTION_KEY
      - key: OPENAI_API_KEY
        sync: true

  # React Frontend (Static Site)
  - type: web
    name: bridgesmart-frontend
    env: static
    buildCommand: npm run build
    publishPath: dist
    rootDirectory: frontend
    plan: free
    envVars:
      - key: VITE_API_URL
        fromService:
          name: bridgesmart-backend
          type: web
          property: url
