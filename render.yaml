databases:
  - name: bridgesmart-db
    databaseName: bridgesmart
    userName: postgres
    plan: free

services:
  # Redis Managed Service
  - type: redis
    name: bridgesmart-redis
    plan: free
    ipAllowList: []

  # FastAPI Backend
  - type: web
    name: bridgesmart-backend
    runtime: docker
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bridgesmart-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: bridgesmart-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: true

  # React Frontend (Static Site)
  - type: static
    name: bridgesmart-frontend
    runtime: static
    buildCommand: npm run build
    staticPublishPath: dist
    rootDirectory: frontend
    envVars:
      - key: VITE_API_URL
        sync: true
