version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: bridgesmart_db
    environment:
      POSTGRES_DB: bridgesmart
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bridgesmart"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bridgesmart_redis
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: bridgesmart_backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/workspace
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  celery_worker:
    build: ./backend
    container_name: bridgesmart_worker
    command: celery -A app.tasks.celery_app worker --loglevel=info
    env_file:
      - .env
    volumes:
      - ./backend:/workspace
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build: ./frontend
    container_name: bridgesmart_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
